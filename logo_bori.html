<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRSVLKV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Libre+Franklin:wght@200;300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C4A46A;
    --gold-light: #E2C98A;
    --gold-dim: #8A6F3F;
    --bg: #080B09;
    --bg-mid: #0F1A12;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Libre Franklin', sans-serif;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
    z-index: 10;
  }

  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  /* ─── LOGO WRAP ─── */
  .logo-wrap {
    position: relative;
    width: min(92vw, 860px);
  }

  .logo-svg-container {
    position: relative;
    width: 100%;
    clip-path: inset(0 100% 0 0 round 2px);
    animation: reveal 1.6s cubic-bezier(0.76, 0, 0.24, 1) 0.4s forwards;
    filter: drop-shadow(0 0 24px rgba(196,164,106,0.08));
  }

  .logo-svg-container svg {
    width: 100%;
    height: auto;
    display: block;
    fill: var(--gold);
    transition: fill 0.3s ease;
  }

  @keyframes reveal {
    0%   { clip-path: inset(0 100% 0 0 round 2px); }
    100% { clip-path: inset(0 0%   0 0 round 2px); }
  }

  /* ─── SHIMMER OVERLAY ─── */
  .shimmer-pass {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(240,210,140,0.55) 50%,
      rgba(255,240,180,0.3) 53%,
      transparent 70%
    );
    background-size: 300% 100%;
    background-position: 150% 0;
    animation: shimmer 0.8s cubic-bezier(0.4, 0, 0.2, 1) 2.1s forwards;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  @keyframes shimmer {
    from { background-position: 150% 0; }
    to   { background-position: -50% 0; }
  }

  /* ─── GLOW PULSE ─── */
  .glow-layer {
    position: absolute;
    inset: -20px;
    background: radial-gradient(ellipse 70% 40% at 50% 50%, rgba(196,164,106,0.12), transparent 70%);
    opacity: 0;
    animation: glowPulse 2s ease-out 2.8s forwards;
    pointer-events: none;
  }

  @keyframes glowPulse {
    0%   { opacity: 0; transform: scale(0.95); }
    40%  { opacity: 1; transform: scale(1.02); }
    100% { opacity: 0.4; transform: scale(1); }
  }

  /* ─── DIVIDER LINE ─── */
  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: 0;
    animation: lineExpand 0.9s cubic-bezier(0.76, 0, 0.24, 1) 2.2s forwards;
  }

  @keyframes lineExpand {
    0%   { width: 0; opacity: 0; }
    30%  { opacity: 1; }
    100% { width: min(60vw, 420px); opacity: 0.6; }
  }

  /* ─── WORDMARK ─── */
  .wordmark {
    font-family: 'Libre Franklin', sans-serif;
    font-weight: 200;
    letter-spacing: 0.55em;
    font-size: clamp(9px, 1.4vw, 13px);
    color: var(--gold-dim);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.9s ease-out 2.6s forwards;
    user-select: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 0.7; transform: translateY(0); }
  }

  /* ─── YEAR TAG ─── */
  .year {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(10px, 1.2vw, 12px);
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    opacity: 0;
    animation: fadeUp 0.6s ease-out 3.1s forwards;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 24px;
    opacity: 0;
    animation: fadeUp 0.9s ease-out 2.8s forwards;
  }

  .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--gold-dim);
    opacity: 0.5;
  }

  /* ─── REPLAY BUTTON ─── */
  .replay-btn {
    position: fixed;
    bottom: 32px;
    right: 36px;
    background: transparent;
    border: 1px solid rgba(196,164,106,0.25);
    color: var(--gold-dim);
    font-family: 'Libre Franklin', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    opacity: 0;
    transition: border-color 0.3s, color 0.3s, opacity 0.3s;
    animation: fadeUp 0.6s ease 3.5s forwards;
  }

  .replay-btn:hover {
    border-color: rgba(196,164,106,0.6);
    color: var(--gold-light);
  }

  /* Replay resets */
  .replaying .logo-svg-container { animation: none; clip-path: inset(0 100% 0 0 round 2px); }
  .replaying .shimmer-pass       { animation: none; background-position: 150% 0; }
  .replaying .glow-layer         { animation: none; opacity: 0; }
  .replaying .divider            { animation: none; width: 0; opacity: 0; }
  .replaying .wordmark           { animation: none; opacity: 0; transform: translateY(8px); }
  .replaying .meta-row           { animation: none; opacity: 0; }
</style>
</head>

<button class="replay-btn" id="replayBtn">↺ &nbsp;Replay</button>

<script>
  const scene = document.getElementById('scene');
  const replayBtn = document.getElementById('replayBtn');

  replayBtn.addEventListener('click', () => {
    // Force reflow to restart animations
    scene.classList.add('replaying');
    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.classList.remove('replaying');

      const els = scene.querySelectorAll(
        '.logo-svg-container, .shimmer-pass, .glow-layer, .divider, .wordmark, .meta-row'
      );

      els.forEach(el => {
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
      });
    });
  });
</script>
